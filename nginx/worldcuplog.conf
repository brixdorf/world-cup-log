# /etc/nginx/sites-available/worldcuplog.conf
# After: sudo ln -s /etc/nginx/sites-available/worldcuplog.conf /etc/nginx/sites-enabled/
# Then:  sudo certbot --nginx -d worldcuplog.romitraj.dev
#        sudo nginx -s reload

server {
    listen 80;
    server_name worldcuplog.romitraj.dev;
    # Redirect all HTTP to HTTPS (certbot will add this automatically, kept here for reference)
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name worldcuplog.romitraj.dev;

    # SSL certificates — managed by certbot (auto-populated)
    # ssl_certificate     /etc/letsencrypt/live/worldcuplog.romitraj.dev/fullchain.pem;
    # ssl_certificate_key /etc/letsencrypt/live/worldcuplog.romitraj.dev/privkey.pem;
    # include             /etc/letsencrypt/options-ssl-nginx.conf;
    # ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    # Security headers
    add_header X-Frame-Options "DENY" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "same-origin" always;

    # ── Static frontend ──────────────────────────────────────────────────
    root /var/www/worldcuplog/client/dist;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;
        # Cache static assets aggressively; index.html never cached
        location ~* \.(js|css|woff2?|png|svg|ico)$ {
            expires 1y;
            add_header Cache-Control "public, immutable";
        }
    }

    # ── API reverse proxy ─────────────────────────────────────────────────
    location /api/ {
        proxy_pass http://127.0.0.1:3003;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Needed for HTTP-only cookies to survive the proxy
        proxy_cookie_path / /;

        # Generous timeouts for long-running refreshes
        proxy_connect_timeout 30s;
        proxy_send_timeout 30s;
        proxy_read_timeout 30s;
    }

    # Block access to dotfiles
    location ~ /\. {
        deny all;
    }
}
